specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: AgentQL
providerId: agentql
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Agents
  - Artificial Intelligence
  - Web Scraping
  - Data Extraction
  - Browser Automation
description: AgentQL prices its data-extraction and Remote Browser APIs as a four-tier model. Free Trial
  is a non-recurring 300-call grant. Starter ($0/mo) is a no-commitment metered plan with a per-call
  overage. Professional ($99/mo) bundles 10k API calls and 500 browser-hours. Enterprise is a custom
  contract for managed/on-prem deployments. Both API calls and Remote Browser hours are metered with
  separate per-unit overage rates.
sources:
  - https://www.agentql.com/pricing
plans:
  - id: agentql-free-trial
    name: Free Trial
    type: freemium
    description: One-time trial for evaluating AgentQL.
    entries:
      - label: API calls (one-time grant)
        name: api_calls_trial
        type: quota
        metric: request
        limit: 300
        timeFrame: usage
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Rate limit
        name: rate_limit
        type: quota
        metric: requests_per_minute
        limit: 10
        timeFrame: minute
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Remote Browser hours (one-time grant)
