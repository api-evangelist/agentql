aid: agentql
name: AgentQL
description: AgentQL connects LLMs and AI agents to the entire web through a specialized query language, REST API, and Python/JavaScript SDKs. It enables web scraping, data extraction, and browser 
  automation using natural language queries that are self-healing — adapting automatically to page layout changes. AgentQL supports structured data extraction from web pages, PDF documents, and 
  images, and integrates with LangChain, LlamaIndex, MCP, Zapier, and Google ADK.
