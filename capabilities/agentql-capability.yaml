naftiko: 1.0.0-alpha2
info:
  label: AgentQL API
  description: AgentQL connects LLMs and AI agents to the entire web through natural language queries, enabling structured
    data extraction from web pages, documents, and browser sessions. Generated from documentation.
  tags:
  - Agentql
  - API
  created: '2026-05-06'
  modified: '2026-05-06'
capability:
  consumes:
  - type: http
    namespace: agentql
    baseUri: https://api.agentql.com/v1
    description: AgentQL API HTTP API.
    authentication:
      type: apikey
      in: header
      name: X-API-Key
      value: '{{AGENTQL_TOKEN}}'
    resources:
    - name: query-data
      path: /query-data
      operations:
      - name: querywebpagedata
        method: POST
        description: AgentQL Query Web Page Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: tetra-sessions
      path: /tetra/sessions
      operations:
      - name: createremotebrowsersession
        method: POST
        description: AgentQL Create Remote Browser Session
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: query-document
      path: /query-document
      operations:
      - name: querydocument
        method: POST
        description: AgentQL Query Document
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: agentql-rest
    description: REST adapter for AgentQL API.
    resources:
    - path: /query-data
      name: querywebpagedata
      operations:
      - method: POST
        name: querywebpagedata
        description: AgentQL Query Web Page Data
        call: agentql.querywebpagedata
        outputParameters:
        - type: object
          mapping: $.
    - path: /tetra/sessions
      name: createremotebrowsersession
      operations:
      - method: POST
        name: createremotebrowsersession
        description: AgentQL Create Remote Browser Session
        call: agentql.createremotebrowsersession
        outputParameters:
        - type: object
          mapping: $.
    - path: /query-document
      name: querydocument
      operations:
      - method: POST
        name: querydocument
        description: AgentQL Query Document
        call: agentql.querydocument
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: agentql-mcp
    transport: http
    description: MCP adapter for AgentQL API for AI agent use.
    tools:
    - name: querywebpagedata
      description: AgentQL Query Web Page Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agentql.querywebpagedata
      outputParameters:
      - type: object
        mapping: $.
    - name: createremotebrowsersession
      description: AgentQL Create Remote Browser Session
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agentql.createremotebrowsersession
      outputParameters:
      - type: object
        mapping: $.
    - name: querydocument
      description: AgentQL Query Document
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: agentql.querydocument
      outputParameters:
      - type: object
        mapping: $.
binds:
- namespace: env
  keys:
    AGENTQL_TOKEN: AGENTQL_TOKEN
